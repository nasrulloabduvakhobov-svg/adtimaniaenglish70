    <path d="M64 84 h152 a26 26 0 0 1 26 26 v70 a26 26 0 0 1 -26 26 H128 l-36 32 v-32 h-28 a26 26 0 0 1 -26 -26 V110 a26 26 0 0 1 26 -26 Z" fill="#ffffff"/>
    <g fill="url(#bg)">
