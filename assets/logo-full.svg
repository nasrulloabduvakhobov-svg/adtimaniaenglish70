      <stop offset="0" stop-color="#10b8b4"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b8b4"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="360" fill="#ffffff"/>

  <!-- emblem -->
  <g transform="translate(40,40)">
