<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="MedLingua logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b8b4"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- rounded square badge -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)" filter="url(#ds)"/>
  <rect x="16" y="16" width="480" height="240" rx="116" fill="url(#sheen)"/>

  <!-- speech bubble (English / speaking) -->
  <g>
    <path d="M132 150 h248 a40 40 0 0 1 40 40 v118 a40 40 0 0 1 -40 40 H236 l-58 52 v-52 h-46 a40 40 0 0 1 -40 -40 V190 a40 40 0 0 1 40 -40 Z"
          fill="#ffffff"/>
  </g>

  <!-- medical cross inside bubble -->
  <g fill="url(#bg)">
    <rect x="232" y="178" width="48" height="142" rx="14"/>
    <rect x="185" y="225" width="142" height="48" rx="14"/>
  </g>

  <!-- "70" badge -->
  <g>
    <circle cx="386" cy="384" r="74" fill="#ffffff"/>
    <circle cx="386" cy="384" r="74" fill="none" stroke="url(#bg)" stroke-width="6" stroke-opacity="0.25"/>
    <text x="386" y="412" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="800"
          text-anchor="middle" fill="#0ea5a4">70</text>
  </g>
</svg>
